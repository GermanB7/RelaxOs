spring:
  application:
    name: tranquiloos
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tranquiloos}
    username: ${POSTGRES_USER:tranquiloos}
    password: ${POSTGRES_PASSWORD:tranquiloos_dev}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  version: ${APP_VERSION:0.0.1}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173},http://127.0.0.1:5173
  security:
    jwt:
      secret: ${JWT_SECRET:change_me_dev_secret_at_least_32_chars}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
