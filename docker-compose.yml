services:
  postgres:
    image: postgres:16-alpine
    container_name: tranquiloos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tranquiloos}
      POSTGRES_USER: ${POSTGRES_USER:-tranquiloos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tranquiloos_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: tranquiloos-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tranquiloos
      SPRING_DATASOURCE_USERNAME: tranquiloos
      SPRING_DATASOURCE_PASSWORD: tranquiloos_dev
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-change_me_dev_secret_at_least_32_chars}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: tranquiloos-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
